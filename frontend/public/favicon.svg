<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer Hexagon / Shield Base -->
  <polygon points="50,5 92,27 92,73 50,95 8,73 8,27" fill="url(#grad)" opacity="0.15" stroke="url(#grad)" stroke-width="4" stroke-linejoin="round" />
  
  <!-- The "Vision" Eye shape -->
  <path d="M 20,50 Q 50,15 80,50 Q 50,85 20,50" fill="none" stroke="url(#grad2)" stroke-width="6" stroke-linecap="round" />
  
  <!-- The "Network" Core -->
  <circle cx="50" cy="50" r="14" fill="url(#grad)" />
  <circle cx="50" cy="50" r="22" fill="none" stroke="#60a5fa" stroke-width="3" opacity="0.6" stroke-dasharray="6 4" />
  
  <!-- Neural / Network Data Streams -->
  <line x1="50" y1="5" x2="50" y2="28" stroke="url(#grad)" stroke-width="4" stroke-linecap="round" />
  <line x1="50" y1="95" x2="50" y2="72" stroke="url(#grad)" stroke-width="4" stroke-linecap="round" />
  <line x1="8" y1="27" x2="28" y2="38" stroke="url(#grad2)" stroke-width="3" stroke-linecap="round" />
  <line x1="92" y1="27" x2="72" y2="38" stroke="url(#grad2)" stroke-width="3" stroke-linecap="round" />
  <line x1="8" y1="73" x2="28" y2="62" stroke="url(#grad2)" stroke-width="3" stroke-linecap="round" />
  <line x1="92" y1="73" x2="72" y2="62" stroke="url(#grad2)" stroke-width="3" stroke-linecap="round" />
</svg>